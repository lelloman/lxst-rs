name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: lxst-rs

jobs:
  cargo-test:
    name: Cargo Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout lxst-rs
        uses: actions/checkout@v6
        with:
          path: lxst-rs

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.93.1

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lxst-rs -> target

      - name: Run workspace tests
        run: cargo test --workspace

  rustfmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout lxst-rs
        uses: actions/checkout@v6
        with:
          path: lxst-rs

      - name: Install Rust with rustfmt
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt

      - name: Run rustfmt check
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout lxst-rs
        uses: actions/checkout@v6
        with:
          path: lxst-rs

      - name: Install Rust with Clippy
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lxst-rs -> target

      - name: Run Clippy
        run: bash scripts/lint-host.sh
